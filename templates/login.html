<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detection | Login</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1e1e1e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .blur-bg {
            width: 100%;
            height: 100%;
            position: absolute;
            background: url("https://images.unsplash.com/photo-1535223289827-42f1e9919769");
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            opacity: 0.25;
            z-index: -1;
        }

        .login-container {
            width: 380px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            color: #00eaff;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border: 1px solid #00eaff;
            box-shadow: 0px 0px 8px #00eaff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00eaff, #0099cc);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #00eaff;
            box-shadow: 0px 0px 12px #00eaff;
        }

        p {
            color: #cfcfcf;
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #00eaff;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="blur-bg"></div>

<div class="login-container">
    <h2>Login</h2>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="login_email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="login_password" placeholder="Enter your password">
    </div>

    <button onclick="loginUser()">Login</button>

    <p>New here? <a href="/signup">Create an account</a></p>
</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<!-- Your custom Firebase auth logic -->
<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
